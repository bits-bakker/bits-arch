# ── sourced files ──────────────────────────────────────────────────────────────
source = ~/.cache/matugen/hyprland-colors.conf
source = ~/.config/hypr/userprefs.conf    # overrides: $terminal, $launcher, monitors

# ── variables ──────────────────────────────────────────────────────────────────
$terminal = kitty
$launcher  = rofi -show drun
$screenshot_region  = hyprshot -m region
$screenshot_window  = hyprshot -m window
$screenshot_screen  = hyprshot -m output

# ── monitors ───────────────────────────────────────────────────────────────────
monitor = , preferred, auto, 1

# ── startup ────────────────────────────────────────────────────────────────────
exec-once = swww-daemon
exec-once = waybar
exec-once = mako
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1

# ── input ──────────────────────────────────────────────────────────────────────
input {
    kb_layout = us
    follow_mouse = 1
    touchpad {
        natural_scroll = true
    }
    sensitivity = 0
}

# ── general ────────────────────────────────────────────────────────────────────
general {
    gaps_in   = 5
    gaps_out  = 10
    border_size = 2
    col.active_border   = $color_primary
    col.inactive_border = $color_outline
    layout = dwindle
}

# ── decoration ─────────────────────────────────────────────────────────────────
decoration {
    rounding = 8
    blur {
        enabled = true
        size    = 6
        passes  = 2
    }
    drop_shadow  = true
    shadow_range = 12
    col.shadow   = rgba(00000066)
}

# ── animations ─────────────────────────────────────────────────────────────────
animations {
    enabled = true
    bezier = smooth, 0.05, 0.9, 0.1, 1.05
    animation = windows,    1, 5,  smooth
    animation = windowsOut, 1, 4,  default, popin 80%
    animation = border,     1, 10, default
    animation = fade,       1, 7,  default
    animation = workspaces, 1, 6,  default
}

# ── layout ─────────────────────────────────────────────────────────────────────
dwindle {
    pseudotile      = true
    preserve_split  = true
}

# ── keybindings ────────────────────────────────────────────────────────────────
$mod = SUPER

bind = $mod,       Return, exec, $terminal
bind = $mod,       D,      exec, $launcher
bind = $mod,       Q,      killactive
bind = $mod SHIFT, E,      exit
bind = $mod,       F,      fullscreen
bind = $mod SHIFT, Space,  togglefloating
bind = $mod,       P,      pseudo
bind = $mod,       J,      togglesplit

# Screenshots (hyprshot)
bind = ,            Print,  exec, $screenshot_region
bind = $mod,        Print,  exec, $screenshot_screen
bind = $mod SHIFT,  Print,  exec, $screenshot_window

# Color picker (hyprpicker — copies hex to clipboard)
bind = $mod, C, exec, hyprpicker -a

# Wallpaper (pick a file via rofi)
bind = $mod SHIFT, W, exec, find ~/Pictures ~/bits-arch/wallpapers -type f \( -iname "*.jpg" -o -iname "*.png" -o -iname "*.webp" \) | rofi -dmenu -p "Wallpaper" | xargs -r ~/bits-arch/scripts/set-wallpaper.sh

# Move focus
bind = $mod, left,  movefocus, l
bind = $mod, right, movefocus, r
bind = $mod, up,    movefocus, u
bind = $mod, down,  movefocus, d

# Workspaces
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5

bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5

# Mouse binds
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# Volume / brightness
bind = , XF86AudioRaiseVolume,  exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bind = , XF86AudioLowerVolume,  exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind = , XF86AudioMute,         exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bind = , XF86MonBrightnessUp,   exec, brightnessctl set 5%+
bind = , XF86MonBrightnessDown, exec, brightnessctl set 5%-

# ── window rules ───────────────────────────────────────────────────────────────
windowrulev2 = float, class:^(pavucontrol)$
windowrulev2 = float, class:^(blueman-manager)$
