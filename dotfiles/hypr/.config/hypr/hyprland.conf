# ── sourced files ──────────────────────────────────────────────────────────────
source = ~/.cache/matugen/hyprland-colors.conf
source = ~/.config/hypr/userprefs.conf    # machine overrides: $terminal, monitors, etc.

# ── environment ────────────────────────────────────────────────────────────────
# Force Wayland for all toolkits
env = QT_QPA_PLATFORM,wayland
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = SDL_VIDEODRIVER,wayland
env = GDK_BACKEND,wayland,x11
env = MOZ_ENABLE_WAYLAND,1
env = XDG_SESSION_TYPE,wayland
env = XDG_CURRENT_DESKTOP,Hyprland
env = XCURSOR_THEME,Adwaita
env = XCURSOR_SIZE,24
# VM / software rendering (harmless on real hardware)
env = WLR_RENDERER_ALLOW_SOFTWARE,1
env = WLR_NO_HARDWARE_CURSORS,1

# ── variables ──────────────────────────────────────────────────────────────────
$terminal = kitty
$launcher  = rofi -show drun

# ── monitors ───────────────────────────────────────────────────────────────────
monitor = , preferred, auto, 1

# ── startup ────────────────────────────────────────────────────────────────────
exec-once = swww-daemon
exec-once = waybar
exec-once = mako
exec-once = swayosd-server
exec-once = hyprsunset -t 4500
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1

# ── input ──────────────────────────────────────────────────────────────────────
input {
    kb_layout = us
    follow_mouse = 1
    touchpad {
        natural_scroll = true
        tap-to-click   = true
    }
    sensitivity = 0
}

# ── general ────────────────────────────────────────────────────────────────────
general {
    gaps_in   = 5
    gaps_out  = 10
    border_size = 2
    col.active_border   = $color_primary
    col.inactive_border = $color_outline
    layout = dwindle
}

# ── decoration ─────────────────────────────────────────────────────────────────
decoration {
    rounding = 8
    blur {
        enabled = true
        size    = 6
        passes  = 2
    }
    drop_shadow  = true
    shadow_range = 12
    col.shadow   = rgba(00000066)
}

# ── animations ─────────────────────────────────────────────────────────────────
animations {
    enabled = true
    bezier = smooth, 0.05, 0.9, 0.1, 1.05
    animation = windows,    1, 5,  smooth
    animation = windowsOut, 1, 4,  default, popin 80%
    animation = border,     1, 10, default
    animation = fade,       1, 7,  default
    animation = workspaces, 1, 6,  default
}

# ── layout ─────────────────────────────────────────────────────────────────────
dwindle {
    pseudotile      = true
    preserve_split  = true
}

# ── keybindings ────────────────────────────────────────────────────────────────
$mod = SUPER

# Core
bind = $mod,       Return, exec, $terminal
bind = $mod,       D,      exec, $launcher
bind = $mod,       Q,      killactive
bind = $mod SHIFT, E,      exit
bind = $mod,       F,      fullscreen
bind = $mod SHIFT, Space,  togglefloating
bind = $mod,       P,      pseudo
bind = $mod,       J,      togglesplit

# Lock screen
bind = $mod, L, exec, hyprlock

# Screenshots (region → satty annotation; screen/window → saved directly)
bind = ,           Print,       exec, ~/bits-arch/scripts/screenshot.sh region
bind = $mod,       Print,       exec, ~/bits-arch/scripts/screenshot.sh screen
bind = $mod SHIFT, Print,       exec, ~/bits-arch/scripts/screenshot.sh window

# Color picker (copies hex to clipboard)
bind = $mod, C, exec, hyprpicker -a

# Wallpaper picker (find images → rofi → set-wallpaper.sh)
bind = $mod SHIFT, W, exec, find ~/Pictures/Wallpapers ~/bits-arch/wallpapers -type f \( -iname "*.jpg" -o -iname "*.png" -o -iname "*.webp" \) | rofi -dmenu -p "Wallpaper" | xargs -r ~/bits-arch/scripts/set-wallpaper.sh

# Blue light filter toggle (Super+Shift+N)
bind = $mod SHIFT, N, exec, pkill -x hyprsunset || hyprsunset -t 4500

# Volume — swayosd shows OSD popup
bind = , XF86AudioRaiseVolume,  exec, swayosd-client --output-volume raise
bind = , XF86AudioLowerVolume,  exec, swayosd-client --output-volume lower
bind = , XF86AudioMute,         exec, swayosd-client --output-volume mute-toggle
bind = , XF86AudioMicMute,      exec, swayosd-client --input-volume mute-toggle

# Brightness — swayosd shows OSD popup
bind = , XF86MonBrightnessUp,   exec, swayosd-client --brightness raise
bind = , XF86MonBrightnessDown, exec, swayosd-client --brightness lower

# Media keys
bind = , XF86AudioPlay,  exec, playerctl play-pause
bind = , XF86AudioNext,  exec, playerctl next
bind = , XF86AudioPrev,  exec, playerctl previous

# Move focus
bind = $mod, left,  movefocus, l
bind = $mod, right, movefocus, r
bind = $mod, up,    movefocus, u
bind = $mod, down,  movefocus, d
bind = $mod, H,     movefocus, l
bind = $mod, L,     movefocus, r
bind = $mod, K,     movefocus, u
bind = $mod, J,     movefocus, d

# Workspaces
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5

bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5

# Mouse binds
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# ── window rules ───────────────────────────────────────────────────────────────
windowrulev2 = float, class:^(pavucontrol)$
windowrulev2 = float, class:^(blueman-manager)$
windowrulev2 = float, class:^(satty)$
windowrulev2 = float, class:^(imv)$
