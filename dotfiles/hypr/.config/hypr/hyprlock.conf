background {
    monitor =
    path    = screenshot
    blur_passes = 3
    blur_size   = 7
}

input-field {
    monitor =
    size = 300, 50
    outline_thickness = 2
    outer_color = rgb({{ colors.primary.default.hex_stripped }})
    inner_color = rgb({{ colors.surface.default.hex_stripped }})
    font_color  = rgb({{ colors.on_surface.default.hex_stripped }})
    fade_on_empty = true
    placeholder_text = <i>Password</i>
    position = 0, -80
    halign   = center
    valign   = center
}

label {
    monitor =
    text     = cmd[update:1000] date +"%H:%M"
    font_size = 72
    color    = rgb({{ colors.on_background.default.hex_stripped }})
    position = 0, 200
    halign   = center
    valign   = center
}
