source = ~/.cache/matugen/hyprlock-colors.conf

background {
    monitor =
    path        = screenshot
    blur_passes = 3
    blur_size   = 7
}

input-field {
    monitor =
    size              = 300, 50
    outline_thickness = 2
    outer_color       = $hl_primary
    inner_color       = $hl_surface
    font_color        = $hl_on_surface
    check_color       = $hl_primary
    fail_color        = rgb(f38ba8)
    fade_on_empty     = true
    placeholder_text  = <i>Password</i>
    position          = 0, -80
    halign            = center
    valign            = center
}

label {
    monitor   =
    text      = cmd[update:1000] date +"%H:%M"
    font_size = 72
    color     = $hl_on_background
    position  = 0, 200
    halign    = center
    valign    = center
}

label {
    monitor   =
    text      = cmd[update:60000] date +"%A, %B %d"
    font_size = 18
    color     = $hl_on_surface
    position  = 0, 130
    halign    = center
    valign    = center
}
